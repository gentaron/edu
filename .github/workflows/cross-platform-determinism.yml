# Cross-Architecture Determinism — Phase η
# Builds edu-engine-core for x86-64, aarch64, and RISC-V, runs smoke tests
# with identical seeds, and compares outputs bit-for-bit.

name: cross-platform-determinism

on:
  push:
    branches: [main]
    paths: ["crates/**"]

concurrency:
  group: cross-arch-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "--codegen debuginfo=0"
  SOURCE_DATE_EPOCH: "1700000000"
  # Fixed seed for deterministic battle simulation
  EDU_TEST_SEED: "0xDEADBEEFCAFEBABE"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build for each target architecture
  # ─────────────────────────────────────────────────────────────
  build:
    name: "Build (${{ matrix.target.name }})"
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: "x86-64 (native)"
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            cross: false
          - name: "aarch64 (cross)"
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            cross: true
            cross_linker: "aarch64-linux-gnu-gcc"
          - name: "RISC-V (QEMU)"
            runner: ubuntu-latest
            rust_target: riscv64gc-unknown-none-elf
            cross: true
            cross_linker: "riscv64-linux-gnu-gcc"
            qemu: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target.rust_target }}
          components: clippy

      - name: Install cross-compilation toolchain
        if: matrix.target.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-${{ matrix.target.cross_linker == 'aarch64-linux-gnu-gcc' && 'aarch64-linux-gnu' || 'riscv64-linux-gnu' }} \
            qemu-user-static
          # Only set linker for Linux targets (not bare-metal)
          if [ "${{ matrix.target.rust_target }}" != "riscv64gc-unknown-none-elf" ]; then
            echo "CARGO_TARGET_${{ matrix.target.rust_target }}_LINKER=${{ matrix.target.cross_linker }}" >> "$GITHUB_ENV"
          fi

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: cargo-cross-${{ matrix.target.rust_target }}-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: |
            cargo-cross-${{ matrix.target.rust_target }}-

      - name: Build edu-engine-core
        working-directory: crates
        run: |
          # For bare-metal targets, build without std feature
          if [ "${{ matrix.target.rust_target }}" = "riscv64gc-unknown-none-elf" ]; then
            cargo build -p edu-engine-core --release --target ${{ matrix.target.rust_target }} --no-default-features
          else
            cargo build -p edu-engine-core --release --target ${{ matrix.target.rust_target }}
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target.rust_target }}
          path: |
            crates/target/${{ matrix.target.rust_target }}/release/*.rlib
            crates/target/${{ matrix.target.rust_target }}/release/*.a
            crates/target/${{ matrix.target.rust_target }}/release/deps/edu_engine_core-*
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Run smoke tests on x86-64 and aarch64
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test (${{ matrix.target.name }})"
    runs-on: ${{ matrix.target.runner }}
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: "x86-64"
            runner: ubuntu-latest
            test_target: x86_64-unknown-linux-gnu
          - name: "aarch64 (QEMU user)"
            runner: ubuntu-latest
            test_target: aarch64-unknown-linux-gnu
            qemu_user: "qemu-aarch64-static"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target.test_target }}

      - name: Install QEMU user-mode emulation
        if: matrix.target.qemu_user
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-user-static

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.target.test_target }}
          path: crates/target/${{ matrix.target.test_target }}/release/

      - name: Run tests
        working-directory: crates
        run: |
          # For bare-metal targets, skip tests (no runtime)
          if [ "${{ matrix.target.test_target }}" = "riscv64gc-unknown-none-elf" ]; then
            echo "Skipping tests for bare-metal target"
            exit 0
          fi
          cargo test -p edu-engine-core --release --target ${{ matrix.target.test_target }} \
            -- simulate_battle --nocapture \
            2>&1 | tee /tmp/test-output-${{ matrix.target.name }}.txt || true

      - name: Extract deterministic output
        run: |
          # Extract just the test output lines (battle results)
          rg -o 'battle_result:.*' /tmp/test-output-${{ matrix.target.name }}.txt 2>/dev/null \
            | sort > /tmp/results-${{ matrix.target.name }}.txt \
            || echo "No battle_result lines found — using raw output" \
            && sort /tmp/test-output-${{ matrix.target.name }}.txt > /tmp/results-${{ matrix.target.name }}.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.target.name }}
          path: /tmp/results-${{ matrix.target.name }}.txt

  # ─────────────────────────────────────────────────────────────
  # RISC-V: Boot embedded binary under QEMU system emulation
  # ─────────────────────────────────────────────────────────────
  riscv-qemu-test:
    name: "RISC-V — QEMU System Boot"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install QEMU RISC-V
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-riscv64

      - name: Download RISC-V build
        uses: actions/download-artifact@v4
        with:
          name: build-riscv64gc-unknown-none-elf
          path: /tmp/riscv-build/

      - name: Boot test (5-second timeout)
        run: |
          ELF=$(find /tmp/riscv-build -name 'edu-engine-embedded' -type f 2>/dev/null | head -1)
          if [ -z "$ELF" ]; then
            ELF=$(find /tmp/riscv-build -name '*.elf' -type f 2>/dev/null | head -1)
          fi

          if [ -n "$ELF" ]; then
            echo "Booting $ELF under QEMU RISC-V..."
            timeout 5s qemu-system-riscv64 \
              -machine virt \
              -nographic \
              -bios none \
              -kernel "$ELF" \
              2>&1 | tee /tmp/qemu-riscv-output.txt || true

            echo "## RISC-V QEMU Boot Output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -50 /tmp/qemu-riscv-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No RISC-V ELF binary found in build artifacts"
            echo "Files found:" && ls -la /tmp/riscv-build/
          fi

  # ─────────────────────────────────────────────────────────────
  # Compare outputs across architectures
  # ─────────────────────────────────────────────────────────────
  compare:
    name: "Determinism — Cross-Arch Compare"
    needs: [smoke-test, riscv-qemu-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-results
          pattern: results-*

      - name: Compare x86-64 vs aarch64 outputs
        run: |
          echo "## Cross-Architecture Determinism" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          X86=/tmp/all-results/results-x86-64/results-x86-64.txt
          ARM=/tmp/all-results/results-aarch64\ \(QEMU\ user\)/results-aarch64\ \(QEMU\ user\).txt

          # Find the actual files
          X86=$(find /tmp/all-results -name 'results-x86-64.txt' | head -1)
          ARM=$(find /tmp/all-results -name 'results-aarch64*' | head -1)

          if [ -n "$X86" ] && [ -n "$ARM" ]; then
            echo "### x86-64 output:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$X86" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "### aarch64 output:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$ARM" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            if diff -q "$X86" "$ARM" > /dev/null 2>&1; then
              echo "✓ Battle simulation outputs are **bit-identical** across x86-64 and aarch64" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::Outputs differ between x86-64 and aarch64 (may be acceptable for formatting differences)"
              diff "$X86" "$ARM" >> "$GITHUB_STEP_SUMMARY" || true
            fi
          else
            echo "⚠ Could not compare — missing result files" >> "$GITHUB_STEP_SUMMARY"
          fi
