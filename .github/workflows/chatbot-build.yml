name: chatbot-build
on:
  pull_request:
    paths:
      - 'src/features/chatbot/**'
      - 'scripts/build-rag-index.ts'
  push:
    branches: [main]
    paths:
      - 'src/features/chatbot/**'
      - 'scripts/build-rag-index.ts'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build:rag -- --force --dry-run
      - run: npx vitest run src/features/chatbot
      - run: npm run build
