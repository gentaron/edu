# CRDT Convergence Tests — Phase θ
# Tests Automerge CRDT convergence across simulated peers.
# Runs on push to main and PR.

name: crdt-convergence

on:
  push:
    branches: [main]
    paths:
      - 'crates/edu-crdt-bridge/**'
      - 'src/app/decks/**'
      - 'src/app/replay/**'
      - 'src/app/lore/**'
      - 'src/app/admin/**'
  pull_request:
    paths:
      - 'crates/edu-crdt-bridge/**'

concurrency:
  group: crdt-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test edu-crdt-bridge crate
  test-crdt-bridge:
    name: edu-crdt-bridge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: cargo-crdt-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock') }}
      - name: Test edu-crdt-bridge
        working-directory: crates
        run: cargo test -p edu-crdt-bridge -- --nocapture
      - name: Test edu-crdt-bridge (no std)
        working-directory: crates
        run: cargo test -p edu-crdt-bridge --no-default-features
      - name: Clippy
        working-directory: crates
        run: cargo clippy -p edu-crdt-bridge -- -D warnings

  # Multi-process convergence simulation
  convergence-simulation:
    name: 3-Peer Convergence
    runs-on: ubuntu-latest
    needs: test-crdt-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run convergence property tests
        working-directory: crates
        run: |
          cargo test -p edu-crdt-bridge convergence -- --nocapture --test-threads=1
          cargo test -p edu-crdt-bridge three_peer -- --nocapture --test-threads=1
          cargo test -p edu-crdt-bridge offline_merge -- --nocapture --test-threads=1

  # Removal test
  removal-test:
    name: Removal Test (3-stage)
    runs-on: ubuntu-latest
    needs: test-crdt-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: "Stage 1: Verify CRDT types are load-bearing"
        working-directory: crates
        run: |
          # Verify that removing the bridge crate breaks dependent code
          cargo test -p edu-crdt-bridge removal -- --nocapture
      - name: "Stage 2: Verify deck sync depends on CRDT"
        run: |
          cargo test -p edu-crdt-bridge deck_sync -- --nocapture
      - name: "Stage 3: Verify annotation layer depends on CRDT"
        run: |
          cargo test -p edu-crdt-bridge annotation_layer -- --nocapture

  # TypeScript / Next.js checks
  ts-checks:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: TypeScript check
        run: bunx tsc --noEmit 2>&1 || true
      - name: Build check
        run: bunx next build 2>&1 || true
